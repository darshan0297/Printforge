<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — PrintForge</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2309090b'/><circle cx='16' cy='16' r='9' fill='%23ef4444'/></svg>">
<link rel="stylesheet" href="../css/style.css">
<style>
.shop-layout {
  display: grid; grid-template-columns: 220px 1fr;
  gap: 2rem; align-items: start;
}
.sidebar {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 1.25rem;
  position: sticky; top: calc(var(--nav-h) + 1rem);
  box-shadow: var(--shadow-sm);
}
.sidebar-section { margin-bottom: 1.25rem; }
.sidebar-section:last-child { margin-bottom: 0; }
.sidebar-label {
  font-family: 'DM Sans', sans-serif; font-weight: 600;
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted);
  margin-bottom: 0.625rem; padding: 0 0.25rem;
}
.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
.filter-btn {
  display: flex; align-items: center; width: 100%;
  text-align: left; background: transparent; border: none;
  color: var(--text2); padding: 0.4rem 0.625rem;
  border-radius: var(--r); font-size: 0.845rem;
  cursor: pointer; transition: all 0.15s; gap: 6px;
}
.filter-btn:hover { background: var(--surface); color: var(--text); }
.filter-btn.active {
  background: rgba(239,68,68,0.08);
  color: var(--accent); font-weight: 500;
  border: 1px solid rgba(239,68,68,0.15);
}
.price-inputs { display: flex; gap: 6px; align-items: center; }
.price-inputs input { padding: 0.45rem 0.625rem; font-size: 0.8rem; }
.price-sep { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
.shop-toolbar {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 1.25rem;
  flex-wrap: wrap; gap: 0.75rem;
}
.shop-title-wrap {}
.shop-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; }
.shop-meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.sort-select {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--r);
  padding: 0.45rem 0.75rem; font-size: 0.845rem;
  cursor: pointer; width: auto;
  transition: border-color 0.15s;
}
.sort-select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(239,68,68,0.08); }
.search-wrap {
  position: relative; margin-bottom: 1.25rem;
}
.search-wrap input {
  padding-left: 2.5rem;
  background: var(--bg3);
  border-color: var(--border);
}
.search-wrap input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 0.75rem; top: 50%;
  transform: translateY(-50%); color: var(--muted);
  font-size: 0.85rem; pointer-events: none;
}
@media(max-width:800px) {
  .shop-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
}
</style>
</head>
<body>
<div id="nav-root"></div>
<div id="toast"><span class="toast-icon"></span><span class="toast-msg"></span></div>
<div class="page-wrap">
<div class="container">
  <section class="section">
    <div class="shop-layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">Category</div>
          <button class="filter-btn active" data-cat="">All Products</button>
          <button class="filter-btn" data-cat="Cosplay Props">🎭 Cosplay Props</button>
          <button class="filter-btn" data-cat="Filament">🧵 Filament</button>
          <button class="filter-btn" data-cat="Printer Parts">🔩 Printer Parts</button>
          <button class="filter-btn" data-cat="Tools & Finishing">🛠️ Tools & Finishing</button>
          <button class="filter-btn" data-cat="Laser Cutting">✨ Laser Cutting</button>
        </div>

        <hr class="sidebar-divider">

        <div class="sidebar-section">
          <div class="sidebar-label">Price Range (LKR)</div>
          <div class="price-inputs">
            <input type="number" id="priceMin" placeholder="Min" min="0">
            <span class="price-sep">—</span>
            <input type="number" id="priceMax" placeholder="Max" min="0">
          </div>
          <button class="btn btn-outline btn-sm btn-block" style="margin-top:.75rem" onclick="applyFilters()">Apply Filter</button>
        </div>

        <hr class="sidebar-divider">

        <div class="sidebar-section">
          <div class="sidebar-label">Availability</div>
          <button class="filter-btn active" data-stock="">All</button>
          <button class="filter-btn" data-stock="in">In Stock</button>
          <button class="filter-btn" data-stock="out">Out of Stock</button>
        </div>
      </aside>

      <!-- Main content -->
      <div>
        <div class="shop-toolbar">
          <div class="shop-title-wrap">
            <div class="shop-title" id="shopTitle">All Products</div>
            <div class="shop-meta" id="shopMeta">Loading…</div>
          </div>
          <select class="sort-select" id="sortSelect" onchange="applyFilters()">
            <option value="default">Default</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>

        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search products…" oninput="applyFilters()">
        </div>

        <div class="products-grid" id="shopGrid">
          <div class="empty-state"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </section>
</div>
<div id="footer-root"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/app.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav('shop');
document.getElementById('footer-root').innerHTML = renderFooter();

let allProducts = [];
let activeCat = '';
let activeStock = '';

document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    document.getElementById('shopTitle').textContent = activeCat || 'All Products';
    applyFilters();
  });
});
document.querySelectorAll('[data-stock]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-stock]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStock = btn.dataset.stock;
    applyFilters();
  });
});

function applyFilters() {
  let products = [...allProducts];
  if (activeCat) products = products.filter(p => p.category === activeCat);
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  if (search) products = products.filter(p =>
    p.name.toLowerCase().includes(search) || p.description?.toLowerCase().includes(search)
  );
  const minP = parseFloat(document.getElementById('priceMin').value) || 0;
  const maxP = parseFloat(document.getElementById('priceMax').value) || Infinity;
  products = products.filter(p => p.price >= minP && p.price <= maxP);
  if (activeStock === 'in')  products = products.filter(p => (p.stock || 0) > 0);
  if (activeStock === 'out') products = products.filter(p => (p.stock || 0) === 0);
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'price-asc')  products.sort((a, b) => a.price - b.price);
  if (sort === 'price-desc') products.sort((a, b) => b.price - a.price);
  if (sort === 'name')       products.sort((a, b) => a.name.localeCompare(b.name));
  renderGrid(products);
}

function renderGrid(products) {
  const grid = document.getElementById('shopGrid');
  const count = products.length;
  document.getElementById('shopMeta').textContent = `${count} product${count !== 1 ? 's' : ''}`;
  if (!count) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>No products match your filters.</p></div>`;
    return;
  }
  grid.innerHTML = products.map(p => renderProductCard(p)).join('');
}

async function init() {
  const params = new URLSearchParams(location.search);
  const cat = params.get('cat');
  if (cat) {
    activeCat = cat;
    document.getElementById('shopTitle').textContent = cat;
    document.querySelectorAll('[data-cat]').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
  }
  const timeout = setTimeout(() => {
    allProducts = DEMO_PRODUCTS;
    applyFilters();
  }, 4000);
  try { allProducts = await DB.getProducts(); }
  catch { allProducts = DEMO_PRODUCTS; }
  clearTimeout(timeout);
  applyFilters();
}
init();
</script>
</body>
</html>
