<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — PrintForge Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2309090b'/><circle cx='16' cy='16' r='9' fill='%23e8ff47'/></svg>">
<link rel="stylesheet" href="../css/style.css">
<style>
body { background: var(--bg2); }
.page-header {
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
}
.page-header .logo { font-size: 1.1rem; }
.main-wrap { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem; }
.page-title { font-family: 'Syne',sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 1.75rem; }

/* Stats row */
.blog-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 2rem; }
.bs-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1rem; box-shadow: var(--shadow-sm); }
.bs-val { font-family: 'Syne',sans-serif; font-weight: 800; font-size: 1.5rem; }
.bs-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }

/* Filter tabs */
.filter-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.ftab { padding: .65rem 1.1rem; background: none; border: none; color: var(--text2); font-size: .855rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: 'Syne',sans-serif; font-weight: 600; transition: all .15s; }
.ftab:hover { color: var(--text); }
.ftab.active { color: var(--accent); border-bottom-color: var(--accent); }
.ftab-count { font-size: .7rem; background: var(--surface); padding: 1px 6px; border-radius: 4px; margin-left: 4px; color: var(--muted); }
.ftab.active .ftab-count { background: rgba(232,255,71,.15); color: var(--accent); }

/* Post row */
.post-row {
  display: grid; grid-template-columns: 60px 1fr auto; gap: 1rem; align-items: center;
  padding: 1rem; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r-lg); margin-bottom: .75rem; transition: border-color .2s; box-shadow: var(--shadow-sm);
}
.post-row:hover { border-color: var(--border2); }
.pr-thumb {
  width: 60px; height: 60px; border-radius: var(--r); overflow: hidden;
  background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0;
}
.pr-thumb img { width: 100%; height: 100%; object-fit: cover; }
.pr-title { font-family: 'Syne',sans-serif; font-weight: 700; font-size: .95rem; margin-bottom: .25rem; cursor: pointer; }
.pr-title:hover { color: var(--accent); }
.pr-meta { font-size: .75rem; color: var(--muted); display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; }
.pr-actions { display: flex; gap: .5rem; align-items: center; flex-shrink: 0; }
.publish-toggle { width: 36px; height: 20px; position: relative; cursor: pointer; }
.publish-toggle input { opacity: 0; width: 0; height: 0; }
.pt-slider { position: absolute; inset: 0; background: var(--surface2); border-radius: 20px; transition: .2s; }
.pt-slider::before { content:''; position:absolute; height:14px; width:14px; left:3px; bottom:3px; background:var(--muted); border-radius:50%; transition:.2s; }
.publish-toggle input:checked + .pt-slider { background: rgba(232,255,71,.2); }
.publish-toggle input:checked + .pt-slider::before { transform:translateX(16px); background:var(--accent); }
</style>
</head>
<body>
<div id="toast"><span class="toast-icon"></span><span class="toast-msg"></span></div>

<div class="page-header">
  <a href="../index.html" class="logo"><span class="logo-dot"></span>PrintForge</a>
  <div style="display:flex;gap:.75rem;align-items:center">
    <a href="admin.html" class="btn btn-outline btn-sm">← Admin</a>
    <a href="blog.html" target="_blank" class="btn btn-outline btn-sm">View Blog ↗</a>
    <a href="blog-editor.html" class="btn btn-accent btn-sm">+ New Post</a>
  </div>
</div>

<div class="main-wrap">
  <div class="page-title">Blog Posts</div>

  <div class="blog-stats">
    <div class="bs-card"><div class="bs-val" id="stat-total">—</div><div class="bs-label">Total Posts</div></div>
    <div class="bs-card"><div class="bs-val" id="stat-pub">—</div><div class="bs-label">Published</div></div>
    <div class="bs-card"><div class="bs-val" id="stat-draft">—</div><div class="bs-label">Drafts</div></div>
    <div class="bs-card"><div class="bs-val" id="stat-views">—</div><div class="bs-label">Total Views</div></div>
  </div>

  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter(this,'')">All <span class="ftab-count" id="fc-all">0</span></button>
    <button class="ftab" onclick="setFilter(this,'published')">Published <span class="ftab-count" id="fc-pub">0</span></button>
    <button class="ftab" onclick="setFilter(this,'draft')">Drafts <span class="ftab-count" id="fc-draft">0</span></button>
    <button class="ftab" onclick="setFilter(this,'scheduled')">Scheduled <span class="ftab-count" id="fc-sched">0</span></button>
  </div>

  <div id="postList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/app.js"></script>
<script>
let allPosts = [], activeFilter = '';

const DEMO = [
  { id:'1', slug:'war-machine-mk4-build', title:'Building a War Machine Mk4 Chest Piece', cover_image:null, status:'published', tags:['Cosplay'], published_at:new Date(Date.now()-3*86400000).toISOString(), read_time:8, views:142, updated_at:new Date(Date.now()-3*86400000).toISOString() },
  { id:'2', slug:'pla-vs-petg-guide', title:'PLA+ vs PETG — Which Should You Use?', cover_image:null, status:'published', tags:['3D Printing','Tutorial'], published_at:new Date(Date.now()-8*86400000).toISOString(), read_time:5, views:89, updated_at:new Date(Date.now()-8*86400000).toISOString() },
  { id:'3', slug:'upcoming-cosplay-tutorial', title:'[DRAFT] Gojo Satoru Mask Build', cover_image:null, status:'draft', tags:['Cosplay'], published_at:null, read_time:6, views:0, updated_at:new Date().toISOString() },
];

async function loadPosts() {
  try {
    const { data, error } = await getSupabase().from('blog_posts').select('*').order('updated_at',{ascending:false});
    allPosts = error ? DEMO : (data?.length ? data : DEMO);
  } catch { allPosts = DEMO; }
  updateStats();
  renderPosts();
}

function updateStats() {
  document.getElementById('stat-total').textContent  = allPosts.length;
  document.getElementById('stat-pub').textContent    = allPosts.filter(p=>p.status==='published').length;
  document.getElementById('stat-draft').textContent  = allPosts.filter(p=>p.status==='draft').length;
  document.getElementById('stat-views').textContent  = allPosts.reduce((s,p)=>s+(p.views||0),0).toLocaleString();
  document.getElementById('fc-all').textContent      = allPosts.length;
  document.getElementById('fc-pub').textContent      = allPosts.filter(p=>p.status==='published').length;
  document.getElementById('fc-draft').textContent    = allPosts.filter(p=>p.status==='draft').length;
  document.getElementById('fc-sched').textContent    = allPosts.filter(p=>p.status==='scheduled').length;
}

function setFilter(btn, filter) {
  activeFilter = filter;
  document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('active', b === btn));
  renderPosts();
}

function renderPosts() {
  const list = document.getElementById('postList');
  const posts = activeFilter ? allPosts.filter(p=>p.status===activeFilter) : allPosts;
  if (!posts.length) { list.innerHTML=`<div class="empty-state"><div class="empty-icon">📝</div><p>No posts here yet.<br><a href="blog-editor.html" style="color:var(--accent)">Write your first post →</a></p></div>`; return; }
  list.innerHTML = posts.map(p => `
    <div class="post-row" id="pr-${p.id}">
      <div class="pr-thumb">${p.cover_image?`<img src="${p.cover_image}">`:'📝'}</div>
      <div>
        <div class="pr-title" onclick="location.href='blog-editor.html?id=${p.id}'">${p.title}</div>
        <div class="pr-meta">
          ${statusBadge(p.status)}
          <span>${p.tags?.join(', ')||'No tags'}</span>
          <span>•</span>
          <span>${p.read_time||1} min read</span>
          <span>•</span>
          <span>${(p.views||0).toLocaleString()} views</span>
          ${p.published_at ? `<span>•</span><span>Published ${fmtDate(p.published_at)}</span>` : `<span>•</span><span>Last edited ${fmtDate(p.updated_at)}</span>`}
        </div>
      </div>
      <div class="pr-actions">
        ${p.status==='published'?`<a href="post.html?slug=${p.slug}" target="_blank" class="btn btn-outline btn-sm">View</a>`:''}
        <label class="publish-toggle" title="${p.status==='published'?'Unpublish':'Publish'}">
          <input type="checkbox" ${p.status==='published'?'checked':''} onchange="togglePublish('${p.id}',this.checked)">
          <span class="pt-slider"></span>
        </label>
        <a href="blog-editor.html?id=${p.id}" class="btn btn-outline btn-sm">Edit</a>
        <button class="btn btn-danger btn-sm" onclick="deletePost('${p.id}','${p.title.replace(/'/g,"\\'")}')">Del</button>
      </div>
    </div>`).join('');
}

async function togglePublish(id, published) {
  const status = published ? 'published' : 'draft';
  const update = { status, updated_at: new Date().toISOString() };
  if (published) update.published_at = new Date().toISOString();
  try { await getSupabase().from('blog_posts').update(update).eq('id', id); } catch {}
  const p = allPosts.find(x=>x.id===id);
  if (p) { p.status = status; if (published) p.published_at = update.published_at; }
  updateStats();
  renderPosts();
  Toast.show(published ? 'Post published' : 'Post unpublished', 'success');
}

async function deletePost(id, title) {
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  try { await getSupabase().from('blog_posts').delete().eq('id', id); } catch {}
  allPosts = allPosts.filter(p=>p.id!==id);
  updateStats();
  renderPosts();
  Toast.show('Post deleted', 'info');
}

loadPosts();
</script>
</body>
</html>
