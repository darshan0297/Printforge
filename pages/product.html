<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — PrintForge</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2309090b'/><circle cx='16' cy='16' r='9' fill='%23e8ff47'/></svg>">
<link rel="stylesheet" href="../css/style.css">
<style>
.product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 3.5rem; align-items: start; padding: 2.5rem 0; }
.product-gallery { position: sticky; top: calc(var(--nav-h) + 1.5rem); }
.main-img {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-lg);
  height: 400px; display: flex; align-items: center; justify-content: center; font-size: 7.5rem;
  overflow: hidden; margin-bottom: 0.75rem; box-shadow: var(--shadow-sm);
}
.main-img img { width: 100%; height: 100%; object-fit: cover; }
.thumbs { display: flex; gap: 0.625rem; }
.thumb {
  width: 68px; height: 68px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 1.6rem; transition: border-color 0.15s; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.thumb:hover, .thumb.active { border-color: var(--accent); }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.product-info { padding-top: 0.25rem; }
.prod-breadcrumb { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 6px; }
.prod-breadcrumb a { color: var(--text2); transition: color 0.15s; }
.prod-breadcrumb a:hover { color: var(--text); }
.prod-title { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.75rem; }
.prod-rating { display: flex; align-items: center; gap: 8px; color: var(--accent); font-size: 0.82rem; margin-bottom: 1.25rem; }
.prod-rating span { color: var(--muted); font-size: 0.78rem; }
.prod-price-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.price-big { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.85rem; color: var(--accent); }
.price-old { font-size: 0.95rem; color: var(--muted); text-decoration: line-through; }
.price-save { background: rgba(34,197,94,0.1); color: var(--green); font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(34,197,94,0.2); }
.prod-desc { font-size: 0.875rem; color: var(--text2); line-height: 1.75; margin-bottom: 1.5rem; }
.qty-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
.qty-ctrl { display: flex; align-items: center; border: 1px solid var(--border2); border-radius: var(--r); overflow: hidden; }
.qty-btn { background: var(--surface); border: none; color: var(--text); width: 38px; height: 40px; cursor: pointer; font-size: 1.1rem; transition: background 0.15s; }
.qty-btn:hover { background: var(--surface2); }
.qty-val { width: 46px; text-align: center; font-family: 'Syne', sans-serif; font-weight: 700; background: var(--bg3); border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); height: 40px; color: var(--text); font-size: 0.9rem; }
.stock-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; font-size: 0.825rem; color: var(--text2); }
.stock-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.stock-dot.low { background: var(--accent); }
.stock-dot.out { background: var(--red); }
.add-row { display: flex; gap: 0.75rem; }
.specs-section { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.75rem; }
.specs-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; margin-bottom: 1rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.72rem; }
.specs-table { width: 100%; }
.specs-table tr:not(:last-child) td { padding-bottom: 0.55rem; }
.specs-table td:first-child { color: var(--muted); font-size: 0.8rem; width: 42%; text-transform: capitalize; }
.specs-table td:last-child { font-size: 0.845rem; font-weight: 500; }
.related-section { padding: 3.5rem 0 2rem; border-top: 1px solid var(--border); margin-top: 2.5rem; }
@media(max-width:800px){ .product-layout{grid-template-columns:1fr;gap:2rem;} .product-gallery{position:static;} }

/* ── 3D VIEWER ── */
.view-tabs { display: flex; gap: 4px; margin-bottom: .75rem; }
.view-tab {
  flex: 1; padding: .45rem .75rem; border-radius: var(--r);
  border: 1px solid var(--border2); background: transparent;
  color: var(--text2); font-family: 'Syne', sans-serif; font-weight: 600;
  font-size: .8rem; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.view-tab:hover { border-color: var(--border3); color: var(--text); }
.view-tab.active { background: rgba(232,255,71,0.08); border-color: var(--accent); color: var(--accent); }
model-viewer {
  width: 100%; height: 400px; border-radius: var(--r-lg);
  background: var(--bg3); --progress-bar-color: var(--accent);
  --progress-bar-height: 3px;
}
.model-wrap {
  position: relative; border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
  margin-bottom: .75rem; box-shadow: var(--shadow-sm);
}
.model-badge {
  position: absolute; top: 10px; left: 10px; z-index: 10;
  background: var(--accent); color: #000; font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: .62rem; letter-spacing: .1em;
  padding: 2px 8px; border-radius: 4px;
}
.model-hint {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
  color: rgba(255,255,255,.75); font-size: .7rem; padding: 3px 10px;
  border-radius: 20px; pointer-events: none; white-space: nowrap;
  transition: opacity .4s; z-index: 10;
}
</style>
</head>
<body>
<div id="nav-root"></div>
<div id="toast"><span class="toast-icon"></span><span class="toast-msg"></span></div>
<div class="page-wrap">
<div class="container" id="productRoot" style="visibility:hidden;min-height:100vh"></div>
<div id="footer-root"></div>
</div>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/app.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav('shop');
document.getElementById('footer-root').innerHTML = renderFooter();

let product = null;
let qty = 1;

async function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.replace('shop.html'); return; }
  try {
    try { product = await DB.getProduct(id); }
    catch { product = DEMO_PRODUCTS.find(p => p.id === id) || DEMO_PRODUCTS[0]; }
    renderProduct();
    loadRelated();
  } catch(e) {
    document.getElementById('productRoot').innerHTML = `<div class="empty-state"><p>Product not found.</p><a href="shop.html" class="btn btn-outline" style="margin-top:1rem">Back to Shop</a></div>`;
  }
}

function renderProduct() {
  const p = product;
  const savings = p.old_price ? Math.round(((p.old_price - p.price) / p.old_price) * 100) : 0;
  const stockCls = p.stock > 5 ? '' : p.stock > 0 ? 'low' : 'out';
  const stockTxt = p.stock > 5 ? `In Stock (${p.stock} available)` : p.stock > 0 ? `Low Stock (${p.stock} left)` : 'Out of Stock';
  const specs = p.specs || {};
  const has3d = !!p.model_url;
  const hasPhotos = !!(p.image || (p.images && p.images.length));

  document.title = `${p.name} — PrintForge`;
  document.getElementById('productRoot').style.visibility = 'visible';
  document.getElementById('productRoot').innerHTML = `
    <div class="product-layout">
      <div class="product-gallery">

        ${has3d && hasPhotos ? `
        <div class="view-tabs">
          <button class="view-tab active" id="tab3d" onclick="showViewer('3d')">⬡ 3D View</button>
          <button class="view-tab" id="tabPhoto" onclick="showViewer('photo')">📷 Photos</button>
        </div>` : has3d ? `
        <div class="view-tabs">
          <button class="view-tab active" id="tab3d">⬡ 3D View</button>
        </div>` : ''}

        ${has3d ? `
        <div class="model-wrap" id="viewer3d">
          <model-viewer
            src="${p.model_url}"
            alt="${p.name} 3D model"
            auto-rotate
            auto-rotate-delay="2000"
            camera-controls
            shadow-intensity="1"
            exposure="0.85"
            environment-image="neutral"
          ></model-viewer>
          <div class="model-badge">3D</div>
          <div class="model-hint" id="modelHint">Drag to rotate · Scroll to zoom</div>
        </div>` : ''}

        <div id="viewerPhoto" ${has3d ? 'style="display:none"' : ''}>
          <div class="main-img" id="mainImg">
            ${p.image ? `<img src="${p.image}" alt="${p.name}">` : `<span>${p.icon || '📦'}</span>`}
          </div>
          <div class="thumbs">
            <div class="thumb active" onclick="setThumb(this,'${p.icon||'📦'}',null)">${p.icon||'📦'}</div>
            ${(p.images||[]).map(img=>`<div class="thumb" onclick="setThumb(this,null,'${img}')"><img src="${img}" alt=""></div>`).join('')}
          </div>
        </div>

      </div>

      <div class="product-info">
        <p class="prod-breadcrumb"><a href="shop.html">Shop</a> / <a href="shop.html?cat=${encodeURIComponent(p.category)}">${p.category}</a> / ${p.name}</p>
        <h1 class="prod-title">${p.name}</h1>
        <div class="prod-rating">★★★★★ <span>4.9 · 28 reviews</span></div>
        <div class="prod-price-row">
          <span class="price-big">${fmt(p.price)}</span>
          ${p.old_price ? `<span class="price-old">${fmt(p.old_price)}</span><span class="price-save">Save ${savings}%</span>` : ''}
        </div>
        <p class="prod-desc">${p.description || ''}</p>
        <div class="stock-row"><span class="stock-dot ${stockCls}"></span>${stockTxt}</div>
        <div class="qty-row">
          <label style="font-size:.82rem;color:var(--text2)">Quantity</label>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <input class="qty-val" type="number" id="qtyInput" value="1" min="1" max="${p.stock||99}" onchange="qty=Math.max(1,parseInt(this.value)||1);this.value=qty">
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>
        <div class="add-row">
          <button class="btn btn-accent btn-lg" style="flex:1" onclick="addItem()" ${p.stock===0?'disabled':''}>
            ${p.stock===0?'Out of Stock':'Add to Cart'}
          </button>
          <a href="cart.html" class="btn btn-outline btn-lg" onclick="event.preventDefault();addItem();location.href='cart.html'">Buy Now</a>
        </div>

        ${Object.keys(specs).length ? `
        <div class="specs-section">
          <div class="specs-title">Specifications</div>
          <table class="specs-table">
            ${Object.entries(specs).map(([k,v])=>`<tr><td>${k.replace(/_/g,' ')}</td><td>${v}</td></tr>`).join('')}
          </table>
        </div>` : ''}

        <div style="margin-top:2rem;padding:1.25rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);font-size:.83rem;color:var(--text2);line-height:1.7">
          🚚 <strong style="color:var(--text)">Free delivery</strong> on orders over ${fmt(CONFIG.shop.freeDeliveryThreshold)}<br>
          📦 <strong style="color:var(--text)">Island-wide delivery</strong> across Sri Lanka<br>
          🏪 <strong style="color:var(--text)">Workshop pickup</strong> available in Mount Lavinia
        </div>
      </div>
    </div>

    <div class="related-section">
      <p class="label">You might also like</p>
      <h3 class="title-md" style="margin-top:.5rem;margin-bottom:2rem">Related Products</h3>
      <div class="products-grid" id="relatedGrid"><div class="spinner"></div></div>
    </div>
  `;

  // Fade out the drag hint after 4 seconds
  if (has3d) {
    setTimeout(() => {
      const hint = document.getElementById('modelHint');
      if (hint) hint.style.opacity = '0';
    }, 4000);
  }
}

function showViewer(mode) {
  const v3d   = document.getElementById('viewer3d');
  const vPhoto= document.getElementById('viewerPhoto');
  const t3d   = document.getElementById('tab3d');
  const tPhoto= document.getElementById('tabPhoto');
  if (mode === '3d') {
    if (v3d)   v3d.style.display   = 'block';
    if (vPhoto) vPhoto.style.display = 'none';
    if (t3d)   t3d.classList.add('active');
    if (tPhoto) tPhoto.classList.remove('active');
  } else {
    if (v3d)   v3d.style.display   = 'none';
    if (vPhoto) vPhoto.style.display = 'block';
    if (t3d)   t3d.classList.remove('active');
    if (tPhoto) tPhoto.classList.add('active');
  }
}

function setThumb(el, emoji, imgSrc) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const main = document.getElementById('mainImg');
  if (imgSrc) main.innerHTML = `<img src="${imgSrc}" alt="">`;
  else main.innerHTML = `<span>${emoji}</span>`;
}

function changeQty(delta) {
  qty = Math.max(1, Math.min(qty + delta, product.stock || 99));
  document.getElementById('qtyInput').value = qty;
}

function addItem() {
  if (!product) return;
  Cart.add({ ...product }, qty);
}

async function loadRelated() {
  const grid = document.getElementById('relatedGrid');
  if (!grid) return;
  let related;
  try { related = await DB.getProducts({ category: product.category, limit: 4 }); }
  catch { related = DEMO_PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4); }
  related = related.filter(p => p.id !== product.id).slice(0, 4);
  grid.innerHTML = related.length ? related.map(p => renderProductCard(p)).join('') : '<p style="color:var(--muted);font-size:.85rem">No related products.</p>';
}

init();
</script>
</body>
</html>
